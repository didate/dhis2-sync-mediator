services:
  dhis2-sync-mediator:
    image: ghcr.io/didate/dhis2-sync-mediator:latest
    restart: unless-stopped
    environment:
      OPENHIM_API_URL: https://openhim-api.dev.${DOMAIN}
      OPENHIM_API_USER: ${OPENHIM_USER}
      OPENHIM_API_PASSWORD: ${OPENHIM_PASSWORD}
      OPENHIM_TRUST_SELF_SIGNED: "false"
      MEDIATOR_PORT: "8001"
      MEDIATOR_URN: "urn:mediator:dhis2-sync"
      MEDIATOR_HOST: sync.dev.${DOMAIN}
      MEDIATOR_SCHEME: https
      DHIS2_SOURCE_URL: ${DHIS2_SOURCE_URL}
      DHIS2_SOURCE_PAT: ${DHIS2_SOURCE_PAT}
      DHIS2_TARGET_URL: ${DHIS2_TARGET_URL}
      DHIS2_TARGET_PAT: ${DHIS2_TARGET_PAT}
      DEFAULT_OU_LEVEL: "6"
      DEFAULT_WEEKS: "4"
      MAX_WORKERS: "5"
      OU_IDENTIFIER_SYSTEM: "urn:dhis2:anss:organisationUnits"
      HAPI_FHIR_URL: https://fhir.dev.${DOMAIN}/fhir
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.dhis2-sync.rule=Host(`sync.dev.${DOMAIN}`)"
      - "traefik.http.routers.dhis2-sync.entrypoints=websecure"
      - "traefik.http.routers.dhis2-sync.tls=true"
      - "traefik.http.routers.dhis2-sync.tls.certresolver=letsencrypt"
      - "traefik.http.services.dhis2-sync.loadbalancer.server.port=8001"

networks:
  proxy:
    external: true
