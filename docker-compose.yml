services:
  dhis2-sync-mediator:
    image: ghcr.io/didate/dhis2-sync-mediator:latest
    restart: unless-stopped
    environment:
      OPENHIM_API_URL: http://openhim-core:8080
      OPENHIM_API_USER: ${OPENHIM_USER}
      OPENHIM_API_PASSWORD: ${OPENHIM_PASSWORD}
      OPENHIM_TRUST_SELF_SIGNED: "false"
      MEDIATOR_PORT: "8001"
      MEDIATOR_URN: "urn:mediator:dhis2-sync"
      MEDIATOR_HOST: dhis2-sync-mediator
      MEDIATOR_SCHEME: http
      DHIS2_SOURCE_URL: ${DHIS2_SOURCE_URL}
      DHIS2_SOURCE_PAT: ${DHIS2_SOURCE_PAT}
      DHIS2_TARGET_URL: ${DHIS2_TARGET_URL}
      DHIS2_TARGET_PAT: ${DHIS2_TARGET_PAT}
      DEFAULT_OU_LEVEL: "6"
      DEFAULT_WEEKS: "4"
      MAX_WORKERS: "5"
    networks:
      - internal
